<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SURPRISE!</title>

  <!-- Pixel fonts. If opened offline these gracefully fall back to monospace,
       which still keeps the retro feel. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ===================================================================
       STAGE  — the game world is a low-res canvas, upscaled with crisp
       pixels. Everything text-heavy (letters, signage, buttons) lives in
       the DOM overlay above it for legibility and accessibility.
  ==================================================================== -->
  <div id="stage">
    <canvas id="game" width="320" height="180" aria-label="Pixel journey"></canvas>

    <!-- UI overlay. The container ignores pointer events; interactive
         children re-enable them individually. -->
    <div id="ui">

      <!-- ---------- Title screen ---------- -->
      <section id="title" class="screen">
        <div class="title-wrap">
          <p class="eyebrow">a gift for a special floofy man</p>
          <h1 class="game-title">What an <br>Eventful Ride!</h1>
          <button id="pressStart" class="press-start" type="button">Press&nbsp;Start</button>
          <button id="beginBtn" class="btn hidden" type="button">Relive The Journey</button>
        </div>
      </section>

      <!-- ---------- Dot-matrix announcement bar ---------- -->
      <div id="announce" class="announce hidden" role="status" aria-live="polite">
        <span class="dot-dash"></span>
        <span id="announceText">Next Stop: Stratford</span>
        <span class="dot-dash"></span>
      </div>

      <!-- ---------- Tap hint ---------- -->
      <p id="hint" class="hint hidden">tap the letter</p>

      <!-- ---------- Letter modal ---------- -->
      <div id="letter" class="letter hidden" role="dialog" aria-modal="true" aria-labelledby="letterTitle">
        <div class="paper">
          <div class="paper-seal">✦</div>
          <h2 id="letterTitle" class="letter-title">Act I</h2>
          <div id="letterBody" class="letter-body"></div>
          <button id="letterContinue" class="btn continue" type="button">Continue</button>
        </div>
      </div>

      <!-- ---------- Corner controls ---------- -->
      <button id="sound" class="chip" type="button" aria-pressed="false" title="Toggle sound">♪ off</button>
      <button id="replay" class="chip replay hidden" type="button" title="Replay">↺ replay</button>
    </div>

    <!-- Soft CRT scanline sheen -->
    <div class="scanlines" aria-hidden="true"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
